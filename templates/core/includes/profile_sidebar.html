{% load static %}
<div id="profile-sidebar"
    class="fixed top-0 left-0 h-full w-[320px] bg-[#0066FF] z-[100] transform -translate-x-full transition-transform duration-500 ease-in-out shadow-[10px_0_50px_rgba(0,0,0,0.2)] flex flex-col p-8 text-white font-inter"
    style="background: linear-gradient(180deg, #157BFF 0%, #15488B 100%);">

    <!-- Close Button (Optional, usually clicking backdrop closes it) -->
    <button onclick="toggleProfileSidebar(event)"
        class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors">
        <i class="fa-solid fa-xmark text-2xl"></i>
    </button>

    <!-- User Header -->
    <div class="flex flex-col items-center mt-12 mb-10">
        <div
            class="w-24 h-24 rounded-full border-4 border-white/20 flex items-center justify-center text-4xl font-bold bg-white/10 backdrop-blur-md shadow-inner mb-6">
            {{ user.username|first|upper }}
        </div>
    </div>

    <!-- Information Section -->
    <div class="bg-white/10 backdrop-blur-md rounded-[30px] p-6 mb-4 border border-white/10">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xs font-bold uppercase tracking-widest opacity-70">{{t.side_info}}</h3>
            <button
                class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-all">
                <i class="fa-solid fa-pen text-[10px]"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-phone text-sm opacity-60"></i>
                <span class="text-xs font-medium">{{ user.profile.phone|default:"+998 (--) --- -- --" }}</span>
            </div>
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-envelope text-sm opacity-60"></i>
                <span class="text-[10px] font-medium break-all">{{ user.email|default:"example@gmail.com" }}</span>
            </div>
        </div>
    </div>

    <!-- Premium Section -->
    <div
        class="bg-white/10 backdrop-blur-md rounded-[24px] p-5 mb-8 border border-white/10 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center">
                <i class="fa-solid fa-plus text-sm"></i>
            </div>
            <div>
                <h4 class="text-sm font-bold">Premium</h4>
                <p class="text-[10px] opacity-60">Free Plan</p>
            </div>
        </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="flex flex-col gap-6 items-center">
        <!-- Subtitles -->
        <a href="#" class="flex flex-col items-center gap-2 group w-full">
            <div
                class="w-full py-4 bg-[#157BFF] rounded-2xl shadow-lg border border-white/10 flex items-center justify-center group-hover:scale-105 transition-all">
                <i class="fa-solid fa-closed-captioning text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">{{t.side_subtitles}}</span>
        </a>

        <!-- Materials -->
        <a href="{% url 'materials' %}" class="flex flex-col items-center gap-2 group w-full">
            <div
                class="w-full py-4 bg-[#157BFF] rounded-2xl shadow-lg border border-white/10 flex items-center justify-center group-hover:scale-105 transition-all">
                <i class="fa-solid fa-folder text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">{{t.side_materials}}</span>
        </a>

        <!-- Creativity -->
        <a href="#" class="flex flex-col items-center gap-2 group w-full">
            <div
                class="w-full py-4 bg-[#157BFF] rounded-2xl shadow-lg border border-white/10 flex items-center justify-center group-hover:scale-105 transition-all">
                <i class="fa-solid fa-wand-magic-sparkles text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-80">{{t.side_creativity}}</span>
        </a>
    </div>

</div>

<!-- Sidebar Backdrop -->
<div id="sidebar-backdrop" onclick="toggleProfileSidebar(event)"
    class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[90] hidden opacity-0 transition-opacity duration-500">
</div>
