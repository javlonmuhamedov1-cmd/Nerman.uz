<header class="sticky top-0 z-50 pt-[25px] pb-6 bg-transparent">
    <nav class="container mx-auto px-4">
        <div class="flex items-center justify-between gap-4">
            <!-- Main Navigation Group -->
            <div
                class="bg-slate-100 rounded-[15px] px-8 py-2 flex items-center shadow-lg h-[80px] flex-grow justify-between">
                <!-- Logo -->
                <a href="{% url 'landing' %}" class="text-2xl font-bold gradient-text font-orbitron mr-8">
                    NERMAN.AI
                </a>

                <div class="hidden md:flex items-center space-x-1">
                    <a href="{% url 'landing' %}" id="nav-home"
                        class="px-5 py-2.5 rounded-full text-sm font-bold transition-all text-slate-900 hover:text-[#157BFF] whitespace-nowrap">
                        {{t.nav_home}}
                    </a>
                    <a href="{% url 'landing' %}#product" id="nav-product"
                        class="px-5 py-2.5 rounded-full text-sm font-bold transition-all text-slate-900 hover:text-[#157BFF] whitespace-nowrap">
                        {{t.nav_product}}
                    </a>

                    <a href="{% url 'about' %}" id="nav-about"
                        class="px-5 py-2.5 rounded-full text-sm font-bold transition-all text-slate-900 hover:text-[#157BFF] whitespace-nowrap">
                        {{t.nav_about}}
                    </a>

                    <a href="{% url 'contact' %}"
                        class="px-5 py-2.5 rounded-full text-sm font-bold transition-all whitespace-nowrap {% if request.resolver_match.url_name == 'contact' %}bg-gradient-to-r from-[#157BFF] to-[#15488B] text-white shadow-lg{% else %}text-slate-900 hover:text-[#157BFF]{% endif %}">
                        {{t.nav_contact}}
                    </a>

                    <div class="relative group ml-1.5">
                        <button id="lang-menu-btn"
                            class="px-5 py-2.5 rounded-full text-sm font-bold bg-black text-white hover:bg-gray-800 transition-all flex items-center shadow-lg">
                            <span class="mr-1">{% if current_lang == 'ru' %}Русский{% else %}O'zbekcha{% endif %}</span>
                            <svg class="w-3 h-3 fill-current" viewBox="0 0 20 20">
                                <path
                                    d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                            </svg>
                        </button>
                        <div
                            class="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-slate-100 opacity-0 group-hover:opacity-100 transition-all pointer-events-none group-hover:pointer-events-auto z-[60]">
                            <a href="{% url 'set_language' %}?lang=ru"
                                class="block px-6 py-3 text-sm font-bold text-slate-700 hover:bg-blue-50 transition-all rounded-t-2xl">Русский</a>
                            <a href="{% url 'set_language' %}?lang=uz"
                                class="block px-6 py-3 text-sm font-bold text-slate-700 hover:bg-blue-50 transition-all rounded-b-2xl">O'zbekcha</a>
                        </div>
                    </div>
                </div>

                <!-- Auth Buttons -->
                <div class="hidden md:flex items-center space-x-4">
                    {% if user.is_authenticated %}
                    <a href="javascript:void(0)" onclick="toggleProfileSidebar(event)"
                        class="px-8 py-3 bg-gradient-to-r from-[#157BFF] to-[#15488B] text-white rounded-full font-bold hover:shadow-lg transition-all text-sm md:text-base shadow-md h-[43px] flex items-center">
                        {{t.nav_dashboard}}
                    </a>
                    <a href="{% url 'login' %}"
                        class="px-4 py-2 text-slate-500 font-bold hover:text-slate-700 transition-all text-sm md:text-base">{{t.nav_logout}}</a>
                    {% else %}
                    <div
                        class="flex items-center justify-between bg-slate-100 rounded-[15px] p-2 w-[280px] h-[60px] shadow-lg">
                        <a href="{% url 'login' %}"
                            class="flex-1 flex items-center justify-center h-full rounded-[12px] text-[#157BFF] font-bold text-lg hover:text-[#15488B] transition-all">
                            {{t.login}}
                        </a>
                    </div>
                    {% endif %}
                </div>

                <!-- Mobile Menu Button -->
                <div class="flex md:hidden items-center space-x-3">
                    <button id="mobile-menu-btn"
                        class="text-2xl text-slate-800 bg-slate-200 w-12 h-10 flex items-center justify-center rounded-xl">
                        ☰
                    </button>
                </div>
            </div>
        </div>
    </nav>
</header>
